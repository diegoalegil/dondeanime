<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Geist, system-ui, sans-serif">
  <defs>
    
    <radialGradient id="warmLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 150) rotate(35) scale(640 520)">
      <stop stop-color="#FF6B4A" stop-opacity="0.18"></stop>
      <stop offset="0.55" stop-color="#FF6B4A" stop-opacity="0.05"></stop>
      <stop offset="1" stop-color="#FF6B4A" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="coolLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 470) rotate(-150) scale(620 520)">
      <stop stop-color="#36E0E6" stop-opacity="0.16"></stop>
      <stop offset="0.55" stop-color="#36E0E6" stop-opacity="0.045"></stop>
      <stop offset="1" stop-color="#36E0E6" stop-opacity="0"></stop>
    </radialGradient>
    
    <linearGradient id="duskTop" x1="600" y1="40" x2="600" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A2140" stop-opacity="0.5"></stop>
      <stop offset="1" stop-color="#1A1D33" stop-opacity="0"></stop>
    </linearGradient>

    
    <linearGradient id="cardA" x1="0" y1="-150" x2="40" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#30334F"></stop>
      <stop offset="1" stop-color="#1F2238"></stop>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="-150" x2="40" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#363a5a"></stop>
      <stop offset="1" stop-color="#24273f"></stop>
    </linearGradient>
    <linearGradient id="cardC" x1="-30" y1="-150" x2="60" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a3e60"></stop>
      <stop offset="1" stop-color="#272a44"></stop>
    </linearGradient>
    <linearGradient id="platePlay" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FF7E5F"></stop>
      <stop offset="1" stop-color="#FF5A38"></stop>
    </linearGradient>

    
    <filter id="gCyan" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="gCoral" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="softShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"></feGaussianBlur>
    </filter>

    <clipPath id="panelClip"><rect x="40" y="40" width="1120" height="550" rx="30"></rect></clipPath>
  </defs>

  
  <rect width="1200" height="630" fill="#0E1020"></rect>

  
  <rect x="40" y="40" width="1120" height="550" rx="30" fill="#1A1D33"></rect>

  <g clip-path="url(#panelClip)">
