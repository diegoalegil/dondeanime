<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DondeAnime genre share card template">
  <title>DondeAnime — Género — OG share card template</title>

  <defs>
    
    <pattern id="diamondGrid" width="58" height="58" patternUnits="userSpaceOnUse" patternTransform="translate(0 0)">
      <path d="M29 7 L51 29 L29 51 L7 29 Z" fill="none" stroke="#F4F5FB" stroke-width="1"></path>
    </pattern>

    
    <radialGradient id="duskWarm" cx="2%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#FF6B4A" stop-opacity="0.16"></stop>
      <stop offset="48%" stop-color="#FF6B4A" stop-opacity="0.05"></stop>
      <stop offset="100%" stop-color="#FF6B4A" stop-opacity="0"></stop>
    </radialGradient>

    
    <radialGradient id="duskCool" cx="92%" cy="60%" r="78%">
      <stop offset="0%" stop-color="#36E0E6" stop-opacity="0.15"></stop>
      <stop offset="46%" stop-color="#36E0E6" stop-opacity="0.05"></stop>
      <stop offset="100%" stop-color="#36E0E6" stop-opacity="0"></stop>
    </radialGradient>

    
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#36E0E6" stop-opacity="0.20"></stop>
      <stop offset="42%" stop-color="#36E0E6" stop-opacity="0.07"></stop>
      <stop offset="100%" stop-color="#36E0E6" stop-opacity="0"></stop>
    </radialGradient>

    
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <clipPath id="panelClip">
      <rect x="28" y="28" width="1144" height="574" rx="26"></rect>
    </clipPath>

    
    <g id="tagBody">
      <path d="M0 48 L34 8 Q38 4 44 4 L142 4 Q150 4 150 12 L150 84 Q150 92 142 92 L44 92 Q38 92 34 88 Z"></path>
      <circle cx="28" cy="48" r="6" fill="#0E1020"></circle>
    </g>
  </defs>

  
  <rect width="1200" height="630" fill="#0E1020"></rect>

  
  <rect x="28" y="28" width="1144" height="574" rx="26" fill="#1A1D33"></rect>

  <g clip-path="url(#panelClip)">
    
    <rect x="28" y="28" width="1144" height="574" fill="url(#diamondGrid)" opacity="0.05"></rect>

    
    <rect x="28" y="28" width="1144" height="574" fill="url(#duskWarm)"></rect>
    <rect x="28" y="28" width="1144" height="574" fill="url(#duskCool)"></rect>

    
    
    <circle cx="905" cy="312" r="205" fill="url(#halo)"></circle>
    <circle cx="905" cy="312" r="158" fill="none" stroke="#36E0E6" stroke-width="1.5" stroke-opacity="0.22"></circle>

    <g filter="url(#neon)">
      
      <g transform="translate(758 246) rotate(-12 75 48)" opacity="0.5">
        <use href="#tagBody" fill="#1C2038" stroke="#36E0E6" stroke-width="2" stroke-opacity="0.6"></use>
      </g>
      <g transform="translate(782 282) rotate(-12 75 48)" opacity="0.78">
        <use href="#tagBody" fill="#20253F" stroke="#36E0E6" stroke-width="2" stroke-opacity="0.8"></use>
      </g>
      <g transform="translate(806 318) rotate(-12 75 48)">
        <use href="#tagBody" fill="#252B47" stroke="#36E0E6" stroke-width="2.4"></use>
      </g>

      
      <g transform="translate(1006 232)">
        <path d="M0 -66 L66 0 L0 66 L-66 0 Z" fill="#36E0E6" fill-opacity="0.10" stroke="#36E0E6" stroke-width="2.4"></path>
        <path d="M0 -66 L66 0 L0 0 L-66 0 Z" fill="#36E0E6" fill-opacity="0.06"></path>
        <path d="M0 -32 L32 0 L0 32 L-32 0 Z" fill="#36E0E6" fill-opacity="0.30" stroke="#36E0E6" stroke-width="2"></path>
        <line x1="0" y1="-66" x2="0" y2="66" stroke="#36E0E6" stroke-width="1.4" stroke-opacity="0.55"></line>
        <line x1="-66" y1="0" x2="66" y2="0" stroke="#36E0E6" stroke-width="1.4" stroke-opacity="0.55"></line>
      </g>
    </g>

    
    

    
    <rect x="88" y="300" width="152" height="46" rx="23" fill="none" stroke="#FF6B4A" stroke-width="2"></rect>

    
    
  </g>
</svg>