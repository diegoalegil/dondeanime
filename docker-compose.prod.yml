# ============================================================
# DondeAnime - Stack de PRODUCCIÓN (Hetzner VPS)
# ------------------------------------------------------------
# Tres servicios:
#   - postgres: BD persistente, NO expone puerto al host
#   - backend:  Spring Boot, NO expone puerto al host
#   - caddy:    reverse proxy con SSL Let's Encrypt automático
#               (único servicio que ve internet)
#
# Las comunicaciones internas (backend → postgres, caddy → backend)
# pasan por la red Docker, usando los nombres de servicio como hosts.
# Esto es más seguro: postgres NO es accesible desde internet.
#
# Uso (en el VPS):
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
#
# Las variables vienen de un archivo .env.prod que NO está en repo.
# Ver .env.prod.example para la plantilla.
# ============================================================

services:
  postgres:
    # Pineado a digest: un tag mutable podría traer otra imagen en un rebuild.
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: dondeanime_postgres_prod
    restart: unless-stopped
    # Límite de memoria: evita que un proceso desbocado tumbe el VPS
    # entero (CX22 = 4 GB). Suma de los tres servicios < 3 GB.
    mem_limit: 768m
    # Rotación de logs: sin esto, json-file crece sin límite y puede
    # llenar el disco del VPS. Máximo 100 MB por servicio (20m x 5).
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NO mapeamos puertos al host. Postgres solo es accesible
    # desde otros contenedores en la misma red Docker.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Solo en la red db: Caddy no necesita ver Postgres.
    networks:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dondeanime_backend
    restart: unless-stopped
    mem_limit: 1536m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Actuator en puerto de management separado: el puerto público (8080)
      # no sirve /actuator aunque Caddy se desconfigurara. Caddy proxea SOLO
      # /actuator/health a este puerto (ver Caddyfile).
      MANAGEMENT_SERVER_PORT: "8081"
      # Permite que el cliente HTTP de Java (java.net.http) mande el header
      # User-Agent custom. Sin esto, el JDK trata User-Agent como header
      # restringido y lo ignora, y AniList (tras Cloudflare) bloquea la
      # petición sin User-Agent de navegador (error 1010 → 400 Invalid token).
      JAVA_TOOL_OPTIONS: "-Djdk.httpclient.allowRestrictedHeaders=user-agent"
      # Conecta a Postgres por nombre de servicio dentro de la red Docker.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      TMDB_API_KEY: ${TMDB_API_KEY}
      # --- Trakt.tv OAuth (opcional) ---
      TRAKT_ENABLED: ${TRAKT_ENABLED:-false}
      TRAKT_API_BASE: ${TRAKT_API_BASE:-https://api.trakt.tv}
      TRAKT_OAUTH_BASE: ${TRAKT_OAUTH_BASE:-https://trakt.tv}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID:-}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET:-}
      TRAKT_REDIRECT_URI: ${TRAKT_REDIRECT_URI:-https://api.dondeanime.com/api/trakt/oauth/callback}
      TRAKT_TOKEN_ENCRYPTION_SECRET: ${TRAKT_TOKEN_ENCRYPTION_SECRET:-}
      # Firma los tokens de /api/trakt/watched y /api/trakt/sync. Fallback a
      # JWT_SECRET aquí: una env var vacía anularía el fallback de Spring.
      TRAKT_ACCESS_TOKEN_SECRET: ${TRAKT_ACCESS_TOKEN_SECRET:-${JWT_SECRET}}
      # Vacío si no usamos webhook. Se rellena cuando configuremos
      # el Deploy Hook de Vercel.
      VERCEL_DEPLOY_HOOK: ${VERCEL_DEPLOY_HOOK:-}
      # Scheduler activo en producción por defecto (en local está OFF).
      # Configurable desde .env.prod para pausarlo sin tocar el repo.
      SCHEDULING_ENABLED: ${SCHEDULING_ENABLED:-true}
      # News Engine: ingesta RSS (ANN + Crunchyroll -> DRAFT) cada 6h.
      # OFF por defecto; pon NEWS_INGESTION_ENABLED=true en .env.prod
      # para encenderla. El scheduler debe estar activo (arriba).
      NEWS_INGESTION_ENABLED: ${NEWS_INGESTION_ENABLED:-false}
      # News Engine: procesado editorial de borradores RSS (resumen,
      # meta, match de anime). OFF por defecto; requiere scheduler activo.
      NEWS_PROCESSING_ENABLED: ${NEWS_PROCESSING_ENABLED:-false}
      # --- Admin (Sprint 1) ---
      # Usuario único del panel admin. La contraseña vive en .env.prod.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Secreto propio para las sesiones JWT del admin; separado del que
      # firma los tokens de email. Fallback a JWT_SECRET (ver nota premium).
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-${JWT_SECRET}}
      ADMIN_CORS_ALLOWED_ORIGINS: ${ADMIN_CORS_ALLOWED_ORIGINS:-https://dondeanime.com,https://www.dondeanime.com}
      # --- Alertas email (Sprint 2) ---
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.dondeanime.com}
      PUBLIC_CORS_ALLOWED_ORIGINS: ${PUBLIC_CORS_ALLOWED_ORIGINS:-https://dondeanime.com,https://www.dondeanime.com}
      JWT_SECRET: ${JWT_SECRET}
      # Secreto propio para los access tokens premium. El fallback a
      # JWT_SECRET se aplica aquí: pasar la env var vacía anularía el
      # fallback de application.properties y firmaría con clave vacía.
      PREMIUM_ACCESS_TOKEN_SECRET: ${PREMIUM_ACCESS_TOKEN_SECRET:-${JWT_SECRET}}
      RESEND_ENABLED: ${RESEND_ENABLED:-true}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-alertas@dondeanime.com}
      # --- Plausible (Sprint 3, opcional) ---
      PLAUSIBLE_ENABLED: ${PLAUSIBLE_ENABLED:-false}
      PLAUSIBLE_API_KEY: ${PLAUSIBLE_API_KEY:-}
      PLAUSIBLE_SITE_ID: ${PLAUSIBLE_SITE_ID:-dondeanime.com}
      # --- Embeddings (Sprint 21, apagado por defecto) ---
      EMBEDDINGS_ENABLED: ${EMBEDDINGS_ENABLED:-false}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      # --- LLM noticias (News Engine S2, apagado por defecto) ---
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.anthropic.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-1500}
      NEWS_LLM_DAILY_LIMIT: ${NEWS_LLM_DAILY_LIMIT:-50}
      # --- Bot Telegram de revision de noticias (S2, apagado por defecto) ---
      NEWS_TELEGRAM_ENABLED: ${NEWS_TELEGRAM_ENABLED:-false}
      NEWS_TELEGRAM_BOT_TOKEN: ${NEWS_TELEGRAM_BOT_TOKEN:-}
      NEWS_TELEGRAM_DIEGO_CHAT_ID: ${NEWS_TELEGRAM_DIEGO_CHAT_ID:-}
      NEWS_TELEGRAM_WEBHOOK_SECRET: ${NEWS_TELEGRAM_WEBHOOK_SECRET:-}
      # --- Alertas críticas Telegram (Sprint 6, opcional) ---
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # --- Web Push (Sprint 14, opcional hasta configurar VAPID) ---
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:contacto@dondeanime.com}
      # --- Stripe Premium (Sprint 15, opcional hasta activar Premium) ---
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://dondeanime.com/premium?success=1}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://dondeanime.com/premium?canceled=1}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-https://dondeanime.com/premium}
    # NO mapeamos puerto al host. Caddy lo proxea desde fuera.
    networks:
      - web
      - db

  caddy:
    # Pineado a digest (ver nota en postgres).
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    container_name: dondeanime_caddy
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # persistencia de certificados Let's Encrypt
      - caddy_config:/config
    depends_on:
      backend:
        # El healthcheck del Dockerfile valida que la API responde: Caddy no
        # arranca proxeando a un backend muerto tras un deploy.
        condition: service_healthy
    networks:
      - web

volumes:
  postgres_data:
    name: dondeanime_postgres_prod_data
  caddy_data:
    name: dondeanime_caddy_data
  caddy_config:
    name: dondeanime_caddy_config

# Redes separadas: web (caddy ↔ backend) y db (backend ↔ postgres).
# Un Caddy comprometido no puede hablar con Postgres directamente.
networks:
  web:
    name: dondeanime_web
    driver: bridge
  db:
    name: dondeanime_db
    driver: bridge
