# Dependabot: actualizaciones semanales de dependencias.
# Minor + patch se agrupan en un solo PR por ecosistema para
# no inundar el repo; las majors llegan en PRs individuales.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
    groups:
      maven-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # Imagenes Docker: docker-compose en la raiz y el Dockerfile del backend.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
