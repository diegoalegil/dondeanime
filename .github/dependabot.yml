# Dependabot: actualizaciones semanales de dependencias.
# Minor + patch se agrupan en un solo PR por ecosistema para
# no inundar el repo; las majors llegan en PRs individuales.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
    groups:
      maven-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # Imagen base del Dockerfile del backend. OJO: el ecosistema docker de
  # Dependabot solo escanea Dockerfiles, NO docker-compose, asi que las imagenes
  # de docker-compose (postgres, caddy) no se actualizan por aqui (y un bloque
  # docker para la raiz, que solo tiene compose, falla cada semana).
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
