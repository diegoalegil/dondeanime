name: Docs

on:
  pull_request:
    paths:
      - 'DISASTER-RECOVERY.md'
      - 'DEPLOY.md'
      - 'SECRETS-ROTATION.md'
      - 'scripts/vps/validate-*.sh'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - main
    paths:
      - 'DISASTER-RECOVERY.md'
      - 'DEPLOY.md'
      - 'SECRETS-ROTATION.md'
      - 'scripts/vps/validate-*.sh'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate disaster recovery doc
        run: bash scripts/vps/validate-disaster-recovery-doc.sh

      - name: Validate deploy doc
        run: bash scripts/vps/validate-deploy-doc.sh

      - name: Validate secrets rotation doc
        run: |
          if [ -f SECRETS-ROTATION.md ]; then
            bash scripts/vps/validate-secrets-rotation-doc.sh
          fi
