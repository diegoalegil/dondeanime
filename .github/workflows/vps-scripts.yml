name: VPS Scripts

on:
  pull_request:
    paths:
      - 'scripts/*.sh'
      - 'scripts/**/*.sh'
      - '.github/workflows/vps-scripts.yml'
  push:
    branches:
      - main
    paths:
      - 'scripts/*.sh'
      - 'scripts/**/*.sh'
      - '.github/workflows/vps-scripts.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate shell scripts parse
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Shellcheck
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning

      - name: Run safe mode smoke tests
        run: bash scripts/vps/smoke-test-safe-modes.sh
