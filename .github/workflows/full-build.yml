name: Full Build (API real)

# Build completo semanal contra la API de producción. Detecta drift entre los
# fixtures del CI y la API real (los PRs buildan contra fixtures y no lo verían).
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-build:
    runs-on: ubuntu-latest
    if: github.repository == 'diegoalegil/dondeanime'
    timeout-minutes: 45
    defaults:
      run:
        working-directory: frontend
    env:
      PUBLIC_API_URL: https://api.dondeanime.com
      PUBLIC_SITE_URL: https://www.dondeanime.com
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend against live API
        run: npm run build

      - name: Validate JSON-LD
        run: npm run validate:jsonld
