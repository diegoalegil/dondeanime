name: Frontend Build

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      PUBLIC_API_URL: https://api.dondeanime.com
      PUBLIC_SITE_URL: https://www.dondeanime.com
      # Build contra fixtures committeados: el CI no toca producción.
      # Regenerar con: node scripts/generate-fixtures.mjs (ver full-build.yml).
      PUBLIC_FIXTURE_DIR: fixtures
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate i18n dictionaries
        run: npm run validate:i18n

      - name: Build frontend
        run: npm run build

      - name: Validate JSON-LD
        run: npm run validate:jsonld
