name: Lighthouse CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          configPath: .github/lighthouse/lighthouserc.json
          temporaryPublicStorage: true
          uploadArtifacts: true

      - name: Comment Lighthouse scores
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          LHCI_MANIFEST: ${{ steps.lhci.outputs.manifest }}
          LHCI_LINKS: ${{ steps.lhci.outputs.links }}
          LHCI_OUTCOME: ${{ steps.lhci.outcome }}
        with:
          script: |
            const marker = '<!-- dondeanime-lighthouse-ci -->';
            const thresholds = {
              performance: 85,
              accessibility: 95,
              seo: 95,
              'best-practices': 90,
            };
            const labels = {
              performance: 'Performance',
              accessibility: 'Accessibility',
              seo: 'SEO',
              'best-practices': 'Best Practices',
            };

            const parseJson = (raw, fallback) => {
              try {
                return raw ? JSON.parse(raw) : fallback;
              } catch {
                return fallback;
              }
            };

            const manifest = parseJson(process.env.LHCI_MANIFEST, []);
            const links = parseJson(process.env.LHCI_LINKS, {});
            const result = Array.isArray(manifest) ? manifest[0] : null;
            const summary = result?.summary ?? {};
            const url = result?.url ?? 'https://dondeanime.com';
            const reportUrl = links[url] ?? Object.values(links)[0];

            const rows = Object.entries(thresholds).map(([key, minimum]) => {
              const score = Math.round((summary[key] ?? 0) * 100);
              const status = score >= minimum ? 'OK' : 'FAIL';
              return `| ${labels[key]} | ${score} | ${minimum} | ${status} |`;
            });

            const outcome = process.env.LHCI_OUTCOME === 'success'
              ? 'OK'
              : 'FAIL';
            const reportLine = reportUrl
              ? `[Ver informe Lighthouse](${reportUrl})`
              : '';
            const body = [
              marker,
              '## Lighthouse CI',
              '',
              `Resultado: **${outcome}**`,
              '',
              '| Categoría | Score | Mínimo | Estado |',
              '|---|---:|---:|---|',
              ...rows,
              '',
              reportLine,
            ].filter(Boolean).join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.data.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail on Lighthouse threshold
        if: steps.lhci.outcome != 'success'
        run: exit 1
