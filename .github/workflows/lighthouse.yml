name: Lighthouse

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/lighthouse.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/lighthouse.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    env:
      PUBLIC_API_URL: https://api.dondeanime.com
      PUBLIC_SITE_URL: https://www.dondeanime.com
      # Build contra fixtures committeados: el CI no toca producción.
      PUBLIC_FIXTURE_DIR: fixtures
      LIGHTHOUSE_MIN_PERFORMANCE_SCORE: 80
      LIGHTHOUSE_MIN_ACCESSIBILITY_SCORE: 90
      LIGHTHOUSE_MIN_BEST_PRACTICES_SCORE: 80
      LIGHTHOUSE_MIN_SEO_SCORE: 80
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Lighthouse template audit
        run: npm run audit:lighthouse

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-report
          path: frontend/lighthouse-report.json
          if-no-files-found: ignore
