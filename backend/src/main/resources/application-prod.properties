# ============================================================
# DondeAnime backend - configuración PRODUCCIÓN
# ------------------------------------------------------------
# Se activa con SPRING_PROFILES_ACTIVE=prod (lo hace docker-compose.prod.yml).
# Hereda de application.properties; aquí solo overrides para prod.
#
# Las credenciales de BD y la API key de TMDb las inyecta el contenedor
# vía variables de entorno (SPRING_DATASOURCE_*, TMDB_API_KEY).
# NO hay secrets en este archivo: es público en el repo.
# ============================================================

# --- Hikari pool ajustado para prod ---
# CX22 tiene 2 vCPUs y 4 GB. Postgres no necesita muchas conexiones
# concurrentes para una API REST con tráfico moderado.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000

# --- JPA / Hibernate + Flyway ---
# En prod el schema lo gobierna Flyway. Antes del primer deploy con
# estas properties hay que marcar V1 como baseline manual en la BD viva.
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Logging: nada de DEBUG en prod ---
# DEBUG en prod satura logs y deja info sensible (SQL con valores,
# paths internos, query strings) en stdout que cualquier atacante
# con acceso a logs vería.
logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.org.springframework.web=INFO
logging.level.com.dondeanime=INFO

# --- Actuator / Prometheus ---
# Caddy bloquea /actuator desde internet; estos endpoints quedan para
# la red Docker interna y futuros scrapers/monitores del VPS.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true

# --- Scheduler ON en prod ---
# Defaultea a true pero docker-compose lo fuerza con SCHEDULING_ENABLED.
scheduling.enabled=${SCHEDULING_ENABLED:true}

# --- Admin (Sprint 1) ---
# ADMIN_PASSWORD vive en /opt/dondeanime/.env.prod. Sin valor real,
# el backend no arranca en prod.
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD}

# --- Alertas email (Sprint 2) ---
# JWT_SECRET y RESEND_API_KEY viven en /opt/dondeanime/.env.prod.
dondeanime.api-url=${PUBLIC_API_URL:https://api.dondeanime.com}
public.cors.allowed-origins=${PUBLIC_CORS_ALLOWED_ORIGINS:https://dondeanime.com,https://www.dondeanime.com}
alerts.jwt-secret=${JWT_SECRET}
resend.enabled=${RESEND_ENABLED:true}
resend.api-base=${RESEND_API_BASE:https://api.resend.com}
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM_EMAIL:alertas@dondeanime.com}

# --- Alertas críticas Telegram (Sprint 6) ---
# OFF por defecto. Activar solo cuando el bot y el chat estén creados.
telegram.enabled=${TELEGRAM_ENABLED:false}
telegram.api-base=https://api.telegram.org
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}

# --- Plausible Analytics (Sprint 3) ---
# La API de stats se usa para /api/admin/dashboard. Si no hay token,
# el dashboard devuelve esa sección vacía sin romper el backend.
plausible.enabled=${PLAUSIBLE_ENABLED:false}
plausible.api-base=${PLAUSIBLE_API_BASE:https://plausible.io}
plausible.api-key=${PLAUSIBLE_API_KEY:}
plausible.site-id=${PLAUSIBLE_SITE_ID:dondeanime.com}

# --- Server ---
# Bind a todas las interfaces del contenedor.
server.address=0.0.0.0
server.port=8080
# Graceful shutdown: cuando docker manda SIGTERM (al hacer down o
# restart), Spring termina las requests en curso antes de cerrar.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# --- Webhook Vercel ---
# URL del Deploy Hook que se llama al final de cada sync de providers
# para que Vercel rebuildee el frontend con datos frescos.
# Vacío = no se dispara nada (default seguro).
vercel.deploy-hook=${VERCEL_DEPLOY_HOOK:}
