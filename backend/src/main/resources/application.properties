# ============================================================
# DondeAnime backend - configuración base (dev local)
# ============================================================

# Carga el .env de la raíz del repo (o del cwd si arranca desde ahí).
# Spring Boot lo trata como properties gracias al sufijo [.properties].
# 'optional:' evita que falle si no existe (CI, prod, etc.).
spring.config.import=optional:file:./.env[.properties],optional:file:../.env[.properties]

spring.application.name=dondeanime-backend
server.port=8080

# Errores en formato RFC 7807 (ProblemDetail). Junto con GlobalExceptionHandler
# da un contrato de error consistente y sin filtrar internals al cliente.
spring.mvc.problemdetails.enabled=true

# ----- APIs externas -----
# Lee TMDB_API_KEY del .env. Si no está, Spring falla al arrancar
# con un mensaje claro (mejor detectar el problema temprano).
tmdb.api-key=${TMDB_API_KEY}
embeddings.enabled=${EMBEDDINGS_ENABLED:false}
embeddings.model=${EMBEDDING_MODEL:}
embeddings.api-base=${EMBEDDING_API_BASE:}
embeddings.api-key=${EMBEDDING_API_KEY:}

# LLM (Anthropic API) para el procesado editorial de noticias. OFF por defecto:
# sin key no se llama a nada y el procesado heurístico actual sigue intacto.
llm.enabled=${LLM_ENABLED:false}
llm.model=${LLM_MODEL:claude-haiku-4-5}
llm.api-base=${LLM_API_BASE:https://api.anthropic.com}
llm.api-key=${ANTHROPIC_API_KEY:}
llm.max-output-tokens=${LLM_MAX_OUTPUT_TOKENS:1500}

# Trakt.tv OAuth. Apagado por defecto hasta configurar credenciales y cifrado.
trakt.enabled=${TRAKT_ENABLED:false}
trakt.api-base=${TRAKT_API_BASE:https://api.trakt.tv}
trakt.oauth-base=${TRAKT_OAUTH_BASE:https://trakt.tv}
trakt.client-id=${TRAKT_CLIENT_ID:}
trakt.client-secret=${TRAKT_CLIENT_SECRET:}
trakt.redirect-uri=${TRAKT_REDIRECT_URI:http://localhost:8080/api/trakt/oauth/callback}
trakt.token-encryption-secret=${TRAKT_TOKEN_ENCRYPTION_SECRET:}
# Firma el token que liga /api/trakt/watched y /api/trakt/sync al dueño de la cuenta vinculada.
trakt.access-token-secret=${TRAKT_ACCESS_TOKEN_SECRET:${JWT_SECRET:dev-secret-change-me}}

# ----- Scheduler -----
# OFF por defecto en local. En producción (Hetzner) lo ponemos a true.
# Los crons aceptan override vía dondeanime.cron.* en .env o por flag.
scheduling.enabled=false

# ----- News Engine: ingesta RSS (Sprint News, S1b) -----
# Flag independiente: aunque el scheduler esté activo, la ingesta solo corre
# si esto es true. Se enciende cuando el News Engine esté listo para producir.
# El cron por defecto es cada 6 horas (a y media).
news.ingestion.enabled=${NEWS_INGESTION_ENABLED:false}

# Procesado editorial de borradores RSS. OFF por defecto: puede rellenar
# resumen/meta/match, pero publicar requiere NEWS_PROCESSING_PUBLISH=true.
news.processing.enabled=${NEWS_PROCESSING_ENABLED:false}
news.processing.publish=${NEWS_PROCESSING_PUBLISH:false}
news.processing.max-items=${NEWS_PROCESSING_MAX_ITEMS:20}

# Siembra (y reconcilia) las fuentes RSS por defecto al arrancar. On por defecto;
# los tests de integración lo apagan para no escribir en la BD de Testcontainers.
news.seed-sources.enabled=${NEWS_SEED_SOURCES_ENABLED:true}

# Cupo diario de redacciones LLM (techo de coste; ~0,4 céntimos por noticia).
news.llm.daily-limit=${NEWS_LLM_DAILY_LIMIT:50}

# Bot de Telegram para revisión editorial (Publicar/Descartar). Independiente
# del bot de alertas (telegram.*). Solo tiene efecto con llm.enabled=true.
news.telegram.enabled=${NEWS_TELEGRAM_ENABLED:false}
news.telegram.api-base=https://api.telegram.org
news.telegram.bot-token=${NEWS_TELEGRAM_BOT_TOKEN:}
news.telegram.chat-id=${NEWS_TELEGRAM_DIEGO_CHAT_ID:}
news.telegram.webhook-secret=${NEWS_TELEGRAM_WEBHOOK_SECRET:}

# ----- Admin (Sprint 1) -----
# En local se puede entrar con admin/admin si no defines ADMIN_PASSWORD.
# En producción application-prod.properties exige ADMIN_PASSWORD real.
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin}
admin.cors.allowed-origins=${ADMIN_CORS_ALLOWED_ORIGINS:http://localhost:4321,http://127.0.0.1:4321,https://dondeanime.com,https://www.dondeanime.com}

# ----- URLs públicas / CORS (Sprint 2) -----
dondeanime.api-url=${PUBLIC_API_URL:http://localhost:8080}
public.cors.allowed-origins=${PUBLIC_CORS_ALLOWED_ORIGINS:http://localhost:4321,http://127.0.0.1:4321,https://dondeanime.com,https://www.dondeanime.com}
dondeanime.site-url=${PUBLIC_SITE_URL:https://dondeanime.com}

# ----- Alertas email (Sprint 2) -----
alerts.jwt-secret=${JWT_SECRET:dev-secret-change-me}

# ----- Admin -----
# Sesiones admin firmadas. Por defecto reutiliza JWT_SECRET para no exigir
# una variable nueva; en produccion puede separarse con ADMIN_JWT_SECRET.
admin.jwt-secret=${ADMIN_JWT_SECRET:${JWT_SECRET:dev-secret-change-me}}
resend.enabled=${RESEND_ENABLED:false}
resend.api-base=${RESEND_API_BASE:https://api.resend.com}
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM_EMAIL:alertas@dondeanime.com}

# ----- Premium -----
# Sesiones Premium firmadas. Por defecto reutiliza JWT_SECRET para no exigir
# una variable nueva; en produccion puede separarse con PREMIUM_ACCESS_TOKEN_SECRET.
premium.access-token-secret=${PREMIUM_ACCESS_TOKEN_SECRET:${JWT_SECRET:dev-secret-change-me}}

# ----- Alertas críticas Telegram (Sprint 6) -----
telegram.enabled=${TELEGRAM_ENABLED:false}
telegram.api-base=https://api.telegram.org
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}

# ----- Plausible Analytics (Sprint 3) -----
# OFF por defecto en local. El frontend puede cargar el script público,
# pero la API de stats solo se consulta si hay token real.
plausible.enabled=${PLAUSIBLE_ENABLED:false}
plausible.api-base=${PLAUSIBLE_API_BASE:https://plausible.io}
plausible.api-key=${PLAUSIBLE_API_KEY:}
plausible.site-id=${PLAUSIBLE_SITE_ID:dondeanime.com}

# ----- Base de datos PostgreSQL (Docker local) -----
spring.datasource.url=jdbc:postgresql://localhost:5433/dondeanime
spring.datasource.username=dondeanime_user
spring.datasource.password=cambiar_en_local
spring.datasource.driver-class-name=org.postgresql.Driver

# Si Postgres tarda en estar listo (lo hace al primer arranque),
# damos margen al pool en vez de explotar al instante.
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway se activa en prod. En local Hibernate mantiene el schema para
# no romper bases dev existentes sin tabla flyway_schema_history.
spring.flyway.enabled=false

# Dialect EXPLÍCITO. Sí, Hibernate suelta un WARN diciendo
# que no hace falta, pero sin esta línea la app explota si
# Hikari no consigue leer metadata al primer intento.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Colecciones lazy/eager en lotes de 50 (IN (...)) en vez de una query por
# entidad. Mitiga el N+1 de genres (EAGER) en listados grandes.
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# Silenciar ese WARN concreto (HHH90000025) para no tener ruido
logging.level.org.hibernate.orm.deprecation=ERROR

# ----- Logging útil -----
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO

# ----- Actuator / métricas -----
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true
