# ============================================================
# DondeAnime backend - configuración base (dev local)
# ============================================================

spring.application.name=dondeanime-backend
server.port=8080

# ----- Base de datos PostgreSQL (Docker local) -----
spring.datasource.url=jdbc:postgresql://localhost:5433/dondeanime
spring.datasource.username=dondeanime_user
spring.datasource.password=cambiar_en_local
spring.datasource.driver-class-name=org.postgresql.Driver

# Si Postgres tarda en estar listo (lo hace al primer arranque),
# damos margen al pool en vez de explotar al instante.
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Dialect EXPLÍCITO. Sí, Hibernate suelta un WARN diciendo
# que no hace falta, pero sin esta línea la app explota si
# Hikari no consigue leer metadata al primer intento.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Silenciar ese WARN concreto (HHH90000025) para no tener ruido
logging.level.org.hibernate.orm.deprecation=ERROR

# ----- Logging útil -----
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO
